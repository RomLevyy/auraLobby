<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aura Lobby</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f2f5; }
        .btn { width: 300px; height: 100px; font-size: 24px; margin: 20px; cursor: pointer; border-radius: 15px; border: none; color: white; }
        .create-btn { background-color: #4CAF50; }
        .join-btn { background-color: #2196F3; }
        .form-container { display: none; margin-top: 20px; }
        input { padding: 10px; font-size: 18px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Aura Lobby</h1>
    
    <button class="btn create-btn" onclick="showForm('create')">Create Lobby</button>
    <button class="btn join-btn" onclick="showForm('join')">Join Lobby</button>

    <div id="create-form" class="form-container">
        <h3>יצירת לובי חדש</h3>
        <input type="text" id="create-first" placeholder="שם פרטי">
        <input type="text" id="create-last" placeholder="שם משפחה">
        <button onclick="generateLobby()">צור קוד</button>
        <p id="lobby-code-display" style="font-weight: bold; font-size: 20px; color: green;"></p>
    </div>

    <div id="join-form" class="form-container">
        <h3>הצטרפות ללובי קיים</h3>
        <input type="text" id="join-first" placeholder="שם פרטי">
        <input type="text" id="join-last" placeholder="שם משפחה">
        <input type="text" id="join-code" placeholder="קוד לובי">
        <button onclick="joinLobby()">הצטרף</button>
    </div>

    <script>
        function showForm(type) {
            document.querySelectorAll('.form-container').forEach(f => f.style.display = 'none');
            document.getElementById(type + '-form').style.display = 'block';
        }

        function generateLobby() {
            const code = Math.floor(1000 + Math.random() * 9000); // מייצר קוד 4 ספרות
            document.getElementById('lobby-code-display').innerText = "קוד הלובי שלך: " + code;
            // כאן נשלח בעתיד את הנתונים לשרת ה-Java
        }

        function joinLobby() {
            alert("מנסה להתחבר ללובי...");
        }
    </script>
</body>
</html>
